# trippytools ingress — TLS is terminated upstream by Traefik (see the
# trippytools service labels in trippinj_docker_env/docker-compose.yml); this
# nginx only serves the static SPA bundle on :80.
#
# Replaces vercel.json's catch-all rewrite ("/[^.]+" -> "/") with a try_files
# fallback to /index.html so the React Router virtual routes resolve.
#
# Caching uses the `expires` directive (not `add_header Cache-Control`) on
# purpose: nginx's `add_header` does NOT merge — a single `add_header` in a
# `location` block drops every `add_header` inherited from `server`. Using
# `expires` for cache control keeps the server-level security headers below
# inherited by both locations.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # App-level security headers, emitted on errors too (`always`). HSTS belongs
    # at the edge (Traefik), so it's intentionally not set here. Both locations
    # below avoid `add_header` so these stay inherited.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # Content-addressed (hash-named) vite assets — cache hard for a year.
    location /assets/ {
        access_log off;
        expires 1y;
        try_files $uri =404;
    }

    # Everything else — let the SPA router resolve, falling back to index so a
    # deep-link refresh doesn't 404. `expires -1` => Cache-Control: no-cache, so
    # index.html always revalidates and deploys take effect immediately.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
